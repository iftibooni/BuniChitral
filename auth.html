<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login/Signup - BuniChitral</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <div class="nav-brand">🏔️ BuniChitral</div>
            <ul class="nav-menu">
                <li><a href="index.html">Home</a></li>
                <li><a href="destinations.html">Chitral Destinations</a></li>
                <li><a href="plans.html">Travel Plans</a></li>
                <li><a href="auth.html" class="active">Login</a></li>
            </ul>
        </div>
    </nav>

    <section class="auth-section">
        <div class="auth-container">
            <div class="auth-tabs">
                <button type="button" class="tab-btn active" data-tab="login">Login</button>
                <button type="button" class="tab-btn" data-tab="signup">Sign Up (Tourist)</button>
            </div>

            <!-- Login Form -->
            <form id="loginForm" class="auth-form active">
                <h2>Login to BuniChitral</h2>
                <input type="email" id="loginEmail" placeholder="Email" required>
                <input type="password" id="loginPassword" placeholder="Password" required>
                <button type="button" id="btnLogin" class="btn btn-primary">Login</button>
                <button type="button" id="btnLoginGoogle" class="btn btn-secondary">
                    📧 Sign In with Google
                </button>
                <p id="loginError" class="error-message"></p>
            </form>

            <!-- Signup Form - Google Only -->
            <form id="signupForm" class="auth-form">
                <h2>Create Tourist Account</h2>
                <p style="text-align: center; margin-bottom: 1.5rem;">Sign up as a tourist to explore Chitral and book trips</p>
                <button type="button" id="btnSignupGoogle" class="btn btn-primary">
                    📧 Sign Up with Google
                </button>
                <div class="auth-divider"><span>or</span></div>
                <input type="text" id="signupName" placeholder="Full name (optional)">
                <input type="email" id="signupEmail" placeholder="Email" required>
                <input type="password" id="signupPassword" placeholder="Password" required>
                <button type="button" id="btnSignupEmail" class="btn btn-primary">
                    Create Account
                </button>
                <p id="signupError" class="error-message"></p>
            </form>

            <p id="authSuccess" class="success-message"></p>
        </div>
    </section>

    <footer class="footer">
        <p>&copy; 2026 BuniChitral. All rights reserved.</p>
    </footer>

    <script src="https://www.gstatic.com/firebasejs/10.5.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.5.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.5.0/firebase-firestore-compat.js"></script>
    <script src="js/firebase-config.js"></script>
    <script src="js/auth-page.js"></script>
</body>
</html>
