<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book a Guide - BuniChitral</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <div class="nav-brand">🏔️ BuniChitral</div>
            <ul class="nav-menu">
                <li><a href="index.html">Home</a></li>
                <li><a href="destinations.html">Chitral Destinations</a></li>
                <li><a href="plans.html">Travel Plans</a></li>
                <li id="authLink"><a href="auth.html">Login</a></li>
                <li id="dashboardLink" style="display: none;"><a href="dashboard.html">Dashboard</a></li>
                <li id="logoutBtn" style="display: none;"><a href="#" onclick="logout()">Logout</a></li>
            </ul>
        </div>
    </nav>

    <section class="container" style="padding: 3rem 0;">
        <div style="max-width: 600px; margin: 0 auto;">
            <h1>Complete Your Booking</h1>

            <div style="background: #f3f4f6; padding: 1.5rem; border-radius: 8px; margin: 2rem 0;">
                <div id="bookingDetails">
                    <p>Loading guide details...</p>
                </div>
            </div>

            <form id="bookingForm" style="background: white; padding: 2rem; border: 1px solid #e5e7eb; border-radius: 8px;">
                <h2>Booking Details</h2>

                <div style="margin-bottom: 1rem;">
                    <label for="startDate"><strong>Start Date:</strong></label>
                    <input type="date" id="startDate" required style="width: 100%; padding: 0.75rem; border: 1px solid #e5e7eb; border-radius: 4px;">
                </div>

                <div style="margin-bottom: 1rem;">
                    <label for="days"><strong>Number of Days:</strong></label>
                    <input type="number" id="days" min="1" max="30" value="1" required style="width: 100%; padding: 0.75rem; border: 1px solid #e5e7eb; border-radius: 4px;">
                </div>

                <div style="margin-bottom: 1rem;">
                    <label for="specialRequests"><strong>Special Requests (Optional):</strong></label>
                    <textarea id="specialRequests" rows="4" placeholder="Any special preferences or requirements..." style="width: 100%; padding: 0.75rem; border: 1px solid #e5e7eb; border-radius: 4px;"></textarea>
                </div>

                <div style="background: #f3f4f6; padding: 1rem; border-radius: 4px; margin: 1.5rem 0;">
                    <p><strong>Total Price:</strong> <span id="totalPrice">Rs. 0</span></p>
                </div>

                <button type="button" class="btn btn-primary" onclick="submitBooking()" style="width: 100%;">Confirm Booking</button>
                <p id="bookingError" class="error-message"></p>
            </form>
        </div>
    </section>

    <footer class="footer">
        <p>&copy; 2026 BuniChitral. All rights reserved.</p>
    </footer>

    <script src="js/firebase-config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/navbar.js"></script>
    <script src="js/payments.js"></script>
    <script src="js/booking.js"></script>
</body>
</html>
