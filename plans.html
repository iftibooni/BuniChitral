<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Travel Plans - BuniChitral</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <div class="nav-brand">🏔️ BuniChitral</div>
            <ul class="nav-menu">
                <li><a href="index.html">Home</a></li>
                <li><a href="guides.html">Guides</a></li>
                <li><a href="plans.html" class="active">Travel Plans</a></li>
                <li id="authLink"><a href="auth.html">Login</a></li>
                <li id="dashboardLink" style="display: none;"><a href="dashboard.html">Dashboard</a></li>
                <li id="logoutBtn" style="display: none;"><a href="#" onclick="logout()">Logout</a></li>
            </ul>
        </div>
    </nav>

    <section class="page-header">
        <h1>Travel Plans & Packages</h1>
        <p>Choose from curated travel experiences in Chitral</p>
    </section>

    <section class="plans-section container">
        <div id="plansList" class="plans-grid">
            <!-- Plans will be loaded here -->
            <p>Loading travel plans...</p>
        </div>
    </section>

    <!-- Plan Detail Modal -->
    <div id="planModal" class="modal" style="display: none;">
        <div class="modal-content">
            <span class="close" onclick="closePlanModal()">&times;</span>
            <div id="planDetail"></div>
            <div class="plan-booking">
                <input type="date" id="planDate" required>
                <input type="number" id="planParticipants" min="1" max="20" value="1" placeholder="Number of people">
                <button class="btn btn-primary" onclick="bookPlan()">Book This Plan</button>
            </div>
        </div>
    </div>

    <footer class="footer">
        <p>&copy; 2026 BuniChitral. All rights reserved.</p>
    </footer>

    <script src="https://www.gstatic.com/firebasejs/10.5.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.5.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.5.0/firebase-firestore.js"></script>
    <script src="js/firebase-config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/navbar.js"></script>
    <script src="js/plans.js"></script>
</body>
</html>
