<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chitral Destinations - BuniChitral</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <div class="nav-brand">🏔️ BuniChitral</div>
            <ul class="nav-menu">
                <li><a href="index.html">Home</a></li>
                <li><a href="destinations.html" class="active">Chitral Destinations</a></li>
                <li><a href="plans.html">Travel Plans</a></li>
                <li id="authLink"><a href="auth.html">Login</a></li>
                <li id="dashboardLink" style="display: none;"><a href="dashboard.html">Dashboard</a></li>
                <li id="logoutBtn" style="display: none;"><a href="#" onclick="logout()">Logout</a></li>
            </ul>
        </div>
    </nav>

    <section class="page-header">
        <h1>Chitral Destinations</h1>
        <p>Explore iconic valleys, passes, and towns — each with photos and a video introduction</p>
    </section>

    <section class="destinations-section container">
        <div class="filters">
            <input type="text" id="destinationSearch" placeholder="Search destinations…">
        </div>

        <div id="destinationsList" class="destinations-grid"></div>
    </section>

    <div id="destinationModal" class="modal" style="display: none;">
        <div class="modal-content modal-content--destination">
            <span class="close" onclick="closeDestinationModal()">&times;</span>
            <div id="destinationDetail"></div>
        </div>
    </div>

    <footer class="footer">
        <p>&copy; 2026 BuniChitral. All rights reserved.</p>
    </footer>

    <script src="https://www.gstatic.com/firebasejs/10.5.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.5.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.5.0/firebase-firestore-compat.js"></script>
    <script src="js/firebase-config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/navbar.js"></script>
    <script src="js/destinations.js"></script>
</body>
</html>
